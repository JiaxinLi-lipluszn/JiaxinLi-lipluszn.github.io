# 把博客部署到 GitHub Pages 的 workflow
# 触发:push 到 main 分支
# 输出:GitHub Pages(用 Pages 自带的 artifact 方式,不再用 gh-pages 分支)
#
# 启用步骤(只做一次):
#   1. 在仓库 Settings → Pages → Build and deployment → Source 选 "GitHub Actions"
#   2. 仓库名建议为 YOUR_USERNAME.github.io(这样默认就是根路径)
#   3. push 到 main 之后,workflow 会自动跑

name: Deploy Hugo site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install latest Hugo CLI (extended)
        # 自动用 gohugoio/hugo 最新的 release。PaperMod 涨版本要求时会自动跟上,
        # 不用每次手动改 HUGO_VERSION。如果想钉死某个版本,把下面那行改成
        # 例如 HUGO_VERSION=0.150.1 并删掉 curl 那行。
        run: |
          HUGO_VERSION=$(curl -fsSL https://api.github.com/repos/gohugoio/hugo/releases/latest | grep -oP '"tag_name":\s*"v\K[^"]+')
          echo "Installing Hugo v${HUGO_VERSION}"
          wget -q -O ${{ runner.temp }}/hugo.deb \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i ${{ runner.temp }}/hugo.deb
          hugo version

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          # 第一次跑 workflow 时自动启用 Pages,不用先去 Settings 手点
          enablement: true

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: Asia/Shanghai
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
