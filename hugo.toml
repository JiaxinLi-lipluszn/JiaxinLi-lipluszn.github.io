# ==========================================================================
# Hugo + PaperMod 配置 — 中英双语,英文默认,极简黑白文字优先
# 文档:https://github.com/adityatelange/hugo-PaperMod/wiki
# ==========================================================================

baseURL = "https://jiaxinli-lipluszn.github.io/"
theme = "PaperMod"

# 多语言:英文 = / (默认),中文 = /zh/
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false   # 英文不要 /en/ 前缀
hasCJKLanguage = true                    # 中英混排时正确处理空格与字数

enableRobotsTXT = true
enableEmoji = true
buildDrafts = false
buildFuture = false
buildExpired = false

pagination.pagerSize = 10

# 代码高亮
[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "github"
  [markup.goldmark.renderer]
    unsafe = true

# 输出格式 — search 页面需要 JSON
[outputs]
  home = ["HTML", "RSS", "JSON"]

# ==========================================================================
# 共享主题参数(两种语言都生效)
# ==========================================================================
[params]
  env = "production"
  author = "Jiaxin"
  defaultTheme = "auto"
  disableThemeToggle = false

  ShowReadingTime = true
  ShowWordCount = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowRssButtonInSectionTermList = true
  comments = false
  hidemeta = false
  hideSummary = false

  # 当配置了多个 [languages] 时,PaperMod 顶部 header 会自动出现语言切换器
  # 这里没有显式开关,加多语言就有

  [params.profileMode]
    enabled = false

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/JiaxinLi-lipluszn"
  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

  [params.assets]
    disableFingerprinting = false
    favicon = "/favicon.ico"

# ==========================================================================
# 语言配置
# ==========================================================================

# ---------- English (default, served at /) ----------
[languages.en]
  languageName = "English"
  languageCode = "en-us"
  weight = 1
  title = "Jiaxin Li"

  [languages.en.params]
    description = "Surviving notes — paper readings, code experiments, and DNA sequence modeling."

  [[languages.en.menu.main]]
    identifier = "posts"
    name = "posts"
    url = "/posts/"
    weight = 10
  [[languages.en.menu.main]]
    identifier = "archives"
    name = "archives"
    url = "/archives/"
    weight = 20
  [[languages.en.menu.main]]
    identifier = "search"
    name = "search"
    url = "/search/"
    weight = 30
  [[languages.en.menu.main]]
    identifier = "about"
    name = "about"
    url = "/about/"
    weight = 40

# ---------- 中文 (served at /zh/) ----------
[languages.zh]
  languageName = "中文"
  languageCode = "zh-cn"
  weight = 2
  title = "李嘉鑫"

  [languages.zh.params]
    description = "幸存的笔记 —— 论文阅读、代码实验,与 DNA 序列建模。"

  [[languages.zh.menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/zh/posts/"
    weight = 10
  [[languages.zh.menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/zh/archives/"
    weight = 20
  [[languages.zh.menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/zh/search/"
    weight = 30
  [[languages.zh.menu.main]]
    identifier = "about"
    name = "关于"
    url = "/zh/about/"
    weight = 40
